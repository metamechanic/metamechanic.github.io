ommunity, you begin turning conscience into action to make all life on Earth thrive.\\n\\nThe EC is an ethical foundation for actions to build a more just, sustainable, and peaceful global society in the 21st century. It articulates a mindset of global interdependence and shared responsibility. It offers a vision of hope and a call to action.\\n\\nThe Earth Charter document starts with the [Preamble](https://earthcharter.org/read-the-earth-charter/preamble/), followed by the four pillars: [Respect and Care for the Community of Life](https://earthcharter.org/read-the-earth-charter/respect-and-care-for-the-community-of-life/), [Ecological Integrity](https://earthcharter.org/read-the-earth-charter/ecological-integrity/), [Social and Economic Justice](https://earthcharter.org/read-the-earth-charter/social-and-economic-justice/), and [Democracy, Nonviolence, and Peace](https://earthcharter.org/read-the-earth-charter/democracy-nonviolence-and-peace/). It concludes with [The Way Forward](https://earthcharter.org/read-the-earth-charter/the-way-forward/).&quot;,536870926]],[&quot;^17&quot;,[18712,&quot;^Q&quot;,&quot;^1B&quot;,536870926]],[&quot;^17&quot;,[18712,&quot;^G&quot;,18711,536870926]],[&quot;^17&quot;,[18712,&quot;^Z&quot;,12896,536870926]],[&quot;^17&quot;,[18712,&quot;^X&quot;,18711,536870926]],[&quot;^17&quot;,[18712,&quot;^W&quot;,12896,536870926]],[&quot;^17&quot;,[18712,&quot;^@&quot;,[&quot;^ &quot;,&quot;~:heading&quot;,2],536870926]],[&quot;^17&quot;,[18712,&quot;^L&quot;,[],536870926]],[&quot;^17&quot;,[18712,&quot;^1F&quot;,true,536870926]],[&quot;^17&quot;,[18712,&quot;^&lt;&quot;,&quot;~u63533399-670e-4626-b239-7f79273e0732&quot;,536870926]],[&quot;^17&quot;,[18713,&quot;^S&quot;,&quot;[Read the Earth Charter - Earth Charter](https://earthcharter.org/read-the-earth-charter/)&quot;,536870926]],[&quot;^17&quot;,[18713,&quot;^Q&quot;,&quot;^1B&quot;,536870926]],[&quot;^17&quot;,[18713,&quot;^G&quot;,18711,536870926]],[&quot;^17&quot;,[18713,&quot;^Z&quot;       // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');

          });
          if (q.p !== undefined) {
            window.history.replaceState(null, null,

              (q.q ? ('?' + q.q) : '') +
              l.hash
            );
